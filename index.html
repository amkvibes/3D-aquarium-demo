<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishy Flow — 3D Aquarium Demo</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #eefafa;
      }

      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* ── Loading screen ───────────────────────────────────────── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 100;
        transition: opacity 0.6s ease;
      }
      #loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        user-select: none;
      }

      .loading-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.06em;
        color: #3a7070;
      }

      .loading-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.12em;
        color: #88b8b8;
        text-transform: uppercase;
      }

      .loading-track {
        width: 220px;
        height: 3px;
        background: #e0f0f0;
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7fdbda, #55b8c0);
        border-radius: 2px;
        transition: width 0.25s ease;
      }

      .loading-pct {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        color: #aacece;
        letter-spacing: 0.05em;
      }

      /* ── Watermark overlay ────────────────────────────────────── */
      #watermark {
        position: fixed;
        bottom: 14px;
        right: 18px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: rgba(80, 130, 130, 0.55);
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BsQKhNsw.js"></script>
  </head>
  <body>
    <!-- Loading screen (hidden once assets are ready) -->
    <div id="loading">
      <div class="loading-inner">
        <div class="loading-title">3D Aquarium Demo</div>
        <div class="loading-sub">Loading Aquarium&hellip;</div>
        <div class="loading-track">
          <div class="loading-fill" id="loading-fill"></div>
        </div>
        <div class="loading-pct" id="loading-pct">0%</div>
      </div>
    </div>

    <!-- Persistent watermark -->
    <div id="watermark">3D Aquarium Demo</div>

  </body>
</html>
